<!-- ══ PET MODAL ══════════════════════════════════════════ -->
<div class="modal-backdrop" id="petModal">
<div class="modal">
  <div class="modal-header">
    <h2 id="petModalTitle">Add Pet</h2>
    <button class="modal-close" onclick="closeModal('petModal')">✕</button>
  </div>
  <input type="hidden" id="editPetId"/>
  <div class="form-group">
    <label>Name <span class="req">*</span></label>
    <input id="pName" class="form-control" placeholder="e.g. Fenty"/>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Gender</label>
      <select id="pGender" class="form-control">
        <option value="">— —</option>
        <option value="F">Female</option>
        <option value="M">Male</option>
      </select>
    </div>
    <div class="form-group">
      <label>Age</label>
      <input id="pAge" class="form-control" placeholder="e.g. 3 years"/>
    </div>
  </div>
  <div class="form-group">
    <label>Breed</label>
    <input id="pBreed" class="form-control" placeholder="e.g. American Curl"/>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal('petModal')">Cancel</button>
    <button class="btn btn-primary" onclick="savePet()">Save Pet</button>
  </div>
</div>
</div>

<script src="app.js"></script>
<script>
if (!Auth.require()) throw '';
renderUserChip();
highlightNav('pets');

const PET_EMOJIS = ['🐱','🐈','😸','😻','🐾','🦁'];

function renderPets() {
  const uid  = Auth.currentUser().id;
  const pets = DB.get('pets').filter(p=>p.userId===uid);
  const el   = document.getElementById('petList');
  if (!pets.length) {
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🐱</div><p>No pets added yet!</p><button class="btn btn-primary" onclick="openPetModal()">+ Add Your First Pet</button></div>`;
    return;
  }
  el.innerHTML = pets.map((p,i)=>{
    const emoji = PET_EMOJIS[i % PET_EMOJIS.length];
    const gLabel = {M:'Male',F:'Female'}[p.gender]||'';
    const meta = [gLabel, p.breed, p.age].filter(Boolean).join(' · ');
    return `<div class="pet-card">
      <div class="pet-avatar">${emoji}</div>
      <div class="pet-info">
        <h3>${p.name}</h3>
        <p>${meta||'No details added'}</p>
      </div>
      <div class="pet-actions">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editPet('${p.id}')">✏️</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deletePet('${p.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function openPetModal(editId) {
  document.getElementById('editPetId').value = editId||'';
  document.getElementById('petModalTitle').textContent = editId ? 'Edit Pet' : 'Add Pet';
  document.getElementById('pName').value='';
  document.getElementById('pGender').value='';
  document.getElementById('pAge').value='';
  document.getElementById('pBreed').value='';
  openModal('petModal');
}

function editPet(id) {
  const p = DB.get('pets').find(p=>p.id===id);
  if (!p) return;
  document.getElementById('editPetId').value = id;
  document.getElementById('petModalTitle').textContent = 'Edit Pet';
  document.getElementById('pName').value   = p.name;
  document.getElementById('pGender').value = p.gender||'';
  document.getElementById('pAge').value    = p.age||'';
  document.getElementById('pBreed').value  = p.breed||'';
  openModal('petModal');
}

function savePet() {
  const name   = document.getElementById('pName').value.trim();
  const gender = document.getElementById('pGender').value;
  const age    = document.getElementById('pAge').value.trim();
  const breed  = document.getElementById('pBreed').value.trim();
  if (!name) { toast('Name is required','danger'); return; }

  const uid  = Auth.currentUser().id;
  const now  = new Date().toISOString();
  const pets = DB.get('pets');
  const editId = document.getElementById('editPetId').value;

  if (editId) {
    const p = pets.find(p=>p.id===editId);
    Object.assign(p,{name,gender,age,breed,lastModifiedDate:now});
  } else {
    pets.push({id:uuid(),userId:uid,name,gender,age,breed,createdDate:now,lastModifiedDate:now});
  }
  DB.set('pets',pets);
  closeModal('petModal');
  toast(editId?'Pet updated!':'Pet added! 🐾','success');
  renderPets();
}

function deletePet(id) {
  if (!confirm('Delete this pet?')) return;
  const pets = DB.get('pets').filter(p=>p.id!==id);
  DB.set('pets',pets);
  toast('Pet removed','warning');
  renderPets();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) m.classList.remove('open'); });
});

renderPets();
</script>
