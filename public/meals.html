  <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;align-items:center">
    <div class="filter-chips" style="margin:0">
      <button class="chip active" data-dr="week" onclick="setDateRange(this,'week')">This Week</button>
      <button class="chip" data-dr="today" onclick="setDateRange(this,'today')">Today</button>
      <button class="chip" data-dr="month" onclick="setDateRange(this,'month')">This Month</button>
      <button class="chip" data-dr="year" onclick="setDateRange(this,'year')">This Year</button>
      <button class="chip" data-dr="all" onclick="setDateRange(this,'all')">All</button>
    </div>
    <select id="limitSel" class="form-control" style="width:auto;padding:.3rem .6rem;font-size:.82rem" onchange="renderMeals()">
      <option value="10">Show 10</option>
      <option value="25">Show 25</option>
      <option value="50">Show 50</option>
    </select>
  </div>

  <div id="mealList"></div>
</div>
</div>

<!-- ══ LOG MEAL MODAL ══════════════════════════════════════ -->
<div class="modal-backdrop" id="mealModal">
<div class="modal">
  <div class="modal-header">
    <h2>🐱 Log a Meal</h2>
    <button class="modal-close" onclick="closeModal('mealModal')">✕</button>
  </div>

  <div class="form-group">
    <label>Date &amp; Time <span class="req">*</span></label>
    <input id="mDate" type="datetime-local" class="form-control"/>
  </div>

  <div class="form-group">
    <label>Pet <span class="req">*</span></label>
    <select id="mPet" class="form-control">
      <option value="">— Select pet —</option>
    </select>
    <p class="form-hint" id="mPetHint"></p>
  </div>

  <div class="form-group">
    <label>Food <span class="req">*</span></label>
    <input id="mFoodSearch" class="form-control" placeholder="Type to search food…" oninput="renderFoodSuggestions()"/>
    <div id="mFoodSuggestions" style="margin-top:.35rem"></div>
    <input type="hidden" id="mFoodInvId"/>
    <p class="form-hint" id="mFoodSelected" style="color:var(--primary);font-weight:700"></p>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Serving Size</label>
      <select id="mSize" class="form-control">
        <option value="">— Select —</option>
        <option>2.8 oz</option><option>5 oz</option><option>1 bowl</option>
      </select>
    </div>
    <div class="form-group">
      <label>Amount <span class="req">*</span></label>
      <input id="mAmount" type="number" min="0" step="any" class="form-control" placeholder="1"/>
    </div>
  </div>

  <div class="form-group">
    <label>Cat Rating</label>
    <div class="multi-chip-wrap" id="ratingChips">
      <span class="multi-chip" data-val="1" onclick="selectRating(this)">⭐ 1</span>
      <span class="multi-chip" data-val="2" onclick="selectRating(this)">⭐ 2</span>
      <span class="multi-chip" data-val="3" onclick="selectRating(this)">⭐ 3</span>
      <span class="multi-chip" data-val="4" onclick="selectRating(this)">⭐ 4</span>
      <span class="multi-chip" data-val="5" onclick="selectRating(this)">⭐ 5</span>
    </div>
  </div>

  <div class="form-group">
    <label>Notes</label>
    <textarea id="mNote" class="form-control" rows="2" placeholder="Anything to note…"></textarea>
  </div>

  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal('mealModal')">Cancel</button>
    <button class="btn btn-accent" onclick="saveMeal()">Log Meal 🐾</button>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
(async () => {
  if (!(await Auth.require())) return;
  renderUserChip();
  highlightNav('meals');
  await renderMeals();
})();

let dateRange = 'week';
let _mRating  = null;
let _selectedInv = null;

function setDateRange(btn, val) {
  dateRange = val;
  document.querySelectorAll('[data-dr]').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderMeals();
}

async function renderMeals() {
  const limit = Number(document.getElementById('limitSel').value);
  const pets  = await Store.list('pets');
  const foods = await Store.list('food_items');
  const invs  = await Store.list('inventory');
  let logs    = (await Store.list('meal_logs'))
                  .sort((a,b)=> new Date(b.dateTime)-new Date(a.dateTime));

  // date filter
  const now = new Date(); const d = new Date();
  if (dateRange==='today') { d.setHours(0,0,0,0); logs=logs.filter(l=>new Date(l.dateTime)>=d); }
  else if (dateRange==='week') { d.setDate(d.getDate()-7); logs=logs.filter(l=>new Date(l.dateTime)>=d); }
  else if (dateRange==='month') { d.setMonth(d.getMonth()-1); logs=logs.filter(l=>new Date(l.dateTime)>=d); }
  else if (dateRange==='year') { d.setFullYear(d.getFullYear()-1); logs=logs.filter(l=>new Date(l.dateTime)>=d); }

  logs = logs.slice(0, limit);
  const el = document.getElementById('mealList');

  if (!logs.length) {
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🍽️</div><p>No meals logged yet. Tap <strong>Meal Time!</strong> to get started!</p></div>`;
    return;
  }

  el.innerHTML = logs.map(log=>{
    const pet   = pets.find(p=>p.id===log.petId);
    const inv   = invs.find(i=>i.id===log.inventoryTableId);
    const food  = inv ? foods.find(f=>f.id===inv.foodItemId) : null;
    const stars = log.catRating ? '⭐'.repeat(Number(log.catRating)) : '';
    const sizeStr = log.size ? log.size+' × ' : '';
    return `<div class="meal-card">
      <div>
        <div class="mc-pet">${pet?pet.name:'Unknown pet'}</div>
        <div class="mc-food">${food? food.brand+' '+food.name : log.foodLabel||'—'}</div>
        <div class="mc-meta">${sizeStr}${log.amount||''} serving${log.note?' · '+log.note:''}</div>
        ${stars?`<div class="star-rating">${stars}</div>`:''}
      </div>
      <div class="mc-date">${fmtDateTime(log.dateTime)}</div>
    </div>`;
  }).join('');
}

// ── Open meal modal ───────────────────────────────────────────
async function openMealModal() {
  const pets = await Store.list('pets');
  const petSel = document.getElementById('mPet');
  petSel.innerHTML = '<option value="">— Select pet —</option>';

  if (!pets.length) {
    document.getElementById('mPetHint').innerHTML =
      '<a href="pets.html">Please add your pet profile first →</a>';
  } else {
    document.getElementById('mPetHint').textContent='';
    pets.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=p.name; petSel.appendChild(o); });
    if (pets.length===1) petSel.value=pets[0].id;
  }

  document.getElementById('mDate').value   = nowISO();
  document.getElementById('mFoodSearch').value = '';
  document.getElementById('mFoodSuggestions').innerHTML='';
  document.getElementById('mFoodInvId').value='';
  document.getElementById('mFoodSelected').textContent='';
  document.getElementById('mAmount').value='1';
  document.getElementById('mSize').value='';
  document.getElementById('mNote').value='';
  _mRating=null; _selectedInv=null;
  document.querySelectorAll('#ratingChips .multi-chip').forEach(c=>c.classList.remove('sel'));
  openModal('mealModal');
}

async function renderFoodSuggestions() {
  const q   = document.getElementById('mFoodSearch').value.toLowerCase();
  const foods = await Store.list('food_items');
  const invs  = (await Store.list('inventory')).filter(i=>
    (i.inventoryNumber===null || i.inventoryNumber==='' || Number(i.inventoryNumber)>0));

  const el = document.getElementById('mFoodSuggestions');
  if (!q) { el.innerHTML=''; return; }

  const matches = [];
  foods.forEach(food=>{
    if (!((food.brand+' '+food.name).toLowerCase().includes(q))) return;
    const foodInvs = invs.filter(i=>i.foodItemId===food.id);
    foodInvs.forEach(inv=>{
      matches.push({food,inv});
    });
    if (!foodInvs.length) matches.push({food,inv:null});
  });

  if (!matches.length) { el.innerHTML='<p style="font-size:.8rem;color:var(--text-muted)">No matching food found.</p>'; return; }
  el.innerHTML = matches.slice(0,8).map(m=>{
    const expStr = m.inv?.expirationDate ? ` · Exp ${fmtDate(m.inv.expirationDate)}` : '';
    const qtyStr = m.inv?.inventoryNumber!=null ? ` · ${m.inv.inventoryNumber} units` : '';
    return `<button class="btn btn-ghost btn-full" style="justify-content:flex-start;margin-bottom:.3rem;font-size:.82rem"
      onclick="selectFood('${m.inv?.id||''}','${m.food.brand} ${m.food.name}','${m.food.id}')">${m.food.brand} – ${m.food.name}<span style="margin-left:auto;color:var(--text-muted)">${expStr}${qtyStr}</span></button>`;
  }).join('');
}

function selectFood(invId,label,foodId) {
  _selectedInv = {invId,label,foodId};
  document.getElementById('mFoodInvId').value   = invId;
  document.getElementById('mFoodSelected').textContent = '✓ '+label;
  document.getElementById('mFoodSearch').value  = label;
  document.getElementById('mFoodSuggestions').innerHTML='';
}

function selectRating(el) {
  _mRating = el.dataset.val;
  document.querySelectorAll('#ratingChips .multi-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

async function saveMeal() {
  const dateT  = document.getElementById('mDate').value;
  const petId  = document.getElementById('mPet').value;
  const invId  = document.getElementById('mFoodInvId').value;
  const amount = document.getElementById('mAmount').value;
  const size   = document.getElementById('mSize').value;
  const note   = document.getElementById('mNote').value.trim();

  if (!dateT||!petId||!amount) { toast('Please fill required fields','danger'); return; }
  if (!_selectedInv) { toast('Please select a food item','danger'); return; }

  await Store.insert('meal_logs', {
    dateTime: dateT, petId,
    inventoryTableId: invId||null,
    foodLabel: _selectedInv.label,
    size, amount: Number(amount), catRating: _mRating, note,
    createdDate: new Date().toISOString()
  });

  // deduct inventory if tracked
  if (invId) {
    const inv = (await Store.list('inventory')).find(i=>i.id===invId);
    if (inv && inv.inventoryNumber!==null && inv.inventoryNumber!=='') {
      await Store.update('inventory', invId, { inventoryNumber: Math.max(0, Number(inv.inventoryNumber) - Number(amount)) });
    }
  }

  closeModal('mealModal');
  toast('Meal logged! 🐾','success');
  await renderMeals();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) m.classList.remove('open'); });
});
</script>
</body>
