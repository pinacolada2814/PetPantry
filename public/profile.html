<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pet Pantry – My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app-shell">

<nav class="topnav">
  <a class="logo" href="inventory.html">🐾 Pet <span>Pantry</span></a>
  <div class="topnav-spacer"></div>
  <div class="nav-user">
    <strong class="nav-user-name"></strong>
    <a href="profile.html" class="avatar-chip nav-user-avatar" style="text-decoration:none"></a>
  </div>
</nav>
<aside class="sidebar">
  <a class="s-logo" href="inventory.html">🐾 Pet <span>Pantry</span></a>
  <a class="s-link" href="inventory.html" data-page="inventory">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>Food Inventory</a>
  <a class="s-link" href="meals.html" data-page="meals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Meal Logs</a>
  <a class="s-link" href="pets.html" data-page="pets">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 10-16 0"/></svg>My Pets</a>
  <div class="s-divider"></div>
  <a class="s-link" href="profile.html" data-page="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
  <a class="s-link" href="app.html" onclick="Auth.logout()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</a>
</aside>

<div class="sidebar-main">
<div class="page-content">

  <div class="page-header">
    <h1>👤 My Profile</h1>
  </div>

  <!-- Avatar card -->
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--primary);
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-size:2rem;font-weight:900;margin:0 auto .75rem" id="bigAvatar"></div>
    <div style="font-size:.75rem;color:var(--text-muted)">User ID: <code id="userId" style="font-size:.72rem"></code></div>
    <div style="font-size:.75rem;color:var(--text-muted);margin-top:.2rem">Member since: <span id="memberSince"></span></div>
  </div>

  <!-- Edit form -->
  <div class="card" style="padding:1rem">
    <div class="form-group">
      <label>Name <span class="req">*</span></label>
      <input id="profName" class="form-control"/>
    </div>
    <div class="form-group">
      <label>Email <span class="req">*</span></label>
      <input id="profEmail" type="email" class="form-control"/>
    </div>
    <div class="form-group">
      <label>New Password <span style="font-weight:400;text-transform:none">(leave blank to keep current)</span></label>
      <input id="profPass" type="password" class="form-control" placeholder="••••••••"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveProfile()">Save Changes</button>
  </div>

  <!-- Stats -->
  <div class="stat-row" id="profStats" style="margin-top:1.25rem"></div>

  <!-- Sign out -->
  <div style="margin-top:1rem">
    <button class="btn btn-ghost btn-full" onclick="doLogout()">Sign Out</button>
  </div>

</div>
</div>
</div>

<nav class="tab-bar">
  <a href="inventory.html" data-page="inventory">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>Pantry</a>
  <a href="meals.html" data-page="meals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Meals</a>
  <a href="pets.html" data-page="pets">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 10-16 0"/></svg>Pets</a>
  <a href="profile.html" data-page="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Profile</a>
</nav>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
(async () => {
  if (!(await Auth.require())) return;
  renderUserChip();
  highlightNav('profile');
  await loadProfile();
})();

async function loadProfile() {
  const u = Auth.currentUser();
  document.getElementById('bigAvatar').textContent = (u.name||'?')[0].toUpperCase();
  document.getElementById('userId').textContent     = u.id;
  document.getElementById('memberSince').textContent= fmtDate(u.createdDate?.slice(0,10));
  document.getElementById('profName').value  = u.name||'';
  document.getElementById('profEmail').value = u.email||'';
  document.getElementById('profPass').value  = '';

  // stats
  const foods = (await Store.list('food_items')).length;
  const meals = (await Store.list('meal_logs')).length;
  const pets  = (await Store.list('pets')).length;
  document.getElementById('profStats').innerHTML = `
    <div class="stat-chip"><div class="sc-val">${pets}</div><div class="sc-lbl">Pets</div></div>
    <div class="stat-chip"><div class="sc-val">${foods}</div><div class="sc-lbl">Foods</div></div>
    <div class="stat-chip"><div class="sc-val">${meals}</div><div class="sc-lbl">Meals Logged</div></div>`;
}

async function saveProfile() {
  const name  = document.getElementById('profName').value.trim();
  const email = document.getElementById('profEmail').value.trim();
  const pass  = document.getElementById('profPass').value;
  if (!name||!email) { toast('Name and email required','danger'); return; }

  const patch = { data: { name } };
  if (email !== Auth.currentUser().email) patch.email = email;
  if (pass) patch.password = pass;

  const { data, error } = await sb.auth.updateUser(patch);
  if (error) { toast(error.message,'danger'); return; }
  Auth._user = mapUser(data.user);
  toast('Profile saved!','success');
  await loadProfile();
  renderUserChip();
}

async function doLogout() {
  await Auth.logout();
  window.location.href='app.html';
}
</script>
</body>
</html>
