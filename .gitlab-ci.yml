# Pet Pantry – GitLab Pages deployment
# Deploys the /public folder as a static site.
# Your site will be at: https://<username>.gitlab.io/<project-name>/

pages:
  stage: deploy
  script:
    - echo "Deploying Pet Pantry static site..."
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
